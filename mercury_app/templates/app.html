<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{page_title or 'Mercury'}}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>{{ favicon_emoji or '🎉' }}</text></svg>">
  {% set theme = page_config.get('theme', {}) %}
  {{ page_config.get('themeFontLinks', '') | safe }}

  <style>
    /* Base reset / typography */
    :root {
      color-scheme: light;
      {{ page_config.get('themeCssVars', '') | safe }}
    }
    html, body {
      padding: 0;
      margin: 0;
      font-family: var(--mercury-font-family);
      font-size: var(--mercury-font-size);
      color: var(--mercury-text-color);
      line-height: 1.55;
      background: var(--mercury-background-color);
    }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== Persistent loader overlay (below header), mobile-friendly ===== */
    :root {
      /* default fallback; JS will set the real header height */
      --header-height: 52px;
      --safe-top: env(safe-area-inset-top, 0px);
    }

    /* Background overlay BELOW the header + safe area */
    html::before {
      content: "";
      position: fixed;
      top: calc(var(--header-height) + var(--safe-top));
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2147483647;
      background: var(--mercury-loader-background-color);
      /* Prevent scroll behind on mobile */
      -webkit-overflow-scrolling: touch;
      touch-action: none;
    }

    /* Coffee box centered BELOW the header */
    html::after {
      content: "Initializing web application…";
      position: fixed;
      top: calc(var(--header-height) + var(--safe-top) + 50%);
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2147483648;

      background: var(--mercury-loader-card-background-color);
      border: 1px solid var(--mercury-loader-border-color);
      border-radius: 1rem;
      padding: 5.1rem 2.25rem 2rem;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      color: var(--mercury-loader-text-color);

      background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='72' height='72' viewBox='0 0 72 72'><rect width='72' height='72' fill='none'/><path d='M18 26h30a0 0 0 0 1 0 0v12a10 10 0 0 1-10 10H28a10 10 0 0 1-10-10V26Z' fill='%23ffffff' stroke='%230f172a' stroke-width='2'/><path d='M48 28h6a6 6 0 0 1 0 12h-6' fill='none' stroke='%230f172a' stroke-width='2'/><path d='M20 22h26' stroke='%230f172a' stroke-width='2' stroke-linecap='round'/><rect x='16' y='46' width='32' height='4' rx='2' fill='%230f172a'/></svg>"),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='72' height='72' viewBox='0 0 72 72'><path d='M22 28c6-6 6-12 0-18c-6-6-6-12 0-18' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round'/><path d='M34 30c6-6 6-12 0-18c-6-6-6-12 0-18' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round'/><path d='M46 28c6-6 6-12 0-18c-6-6-6-12 0-18' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat, no-repeat;
      background-position: center 1.9rem, center 1.3rem;
      background-size: 56px 56px, 48px 48px;
      animation: mercury-steam-float 1.8s ease-in-out infinite;

      /* Mobile-friendly sizing */
      width: min(92vw, 28rem);
      box-sizing: border-box;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    /* Small screens: tighten spacing and font size */
    @media (max-width: 480px) {
      html::after {
        padding: 4.6rem 1.25rem 1.5rem;
        font-size: 16px;
        border-radius: .75rem;
        width: min(94vw, 24rem);
        background-position: center 1.7rem, center 1.1rem;
        background-size: 48px 48px, 40px 40px;
      }
    }

    @keyframes mercury-steam-float {
      0%, 100% {
        background-position: center 1.9rem, center 1.3rem;
        background-size: 56px 56px, 46px 46px;
      }
      50% {
        background-position: center 1.9rem, center 1.3rem;
        background-size: 56px 56px, 48px 50px;
      }
    }

    /* Hide overlay when ready */
    html.hide-loader::before,
    html.hide-loader::after { display: none !important; }

    html.no-navbar {
      --header-height: 0px;
    }

    body .mercury-left-panel {
      background: var(--mercury-sidebar-background-color) !important;
      color: var(--mercury-sidebar-text-color) !important;
      box-shadow: var(--mercury-sidebar-shadow) !important;
    }

    body .mercury-left-content,
    body .mercury-left-header,
    body .mercury-left-footer {
      background: var(--mercury-sidebar-background-color) !important;
      color: var(--mercury-sidebar-text-color) !important;
    }

    body .mercury-right-top-panel,
    body .mercury-right-bottom-panel {
      background: var(--mercury-content-background-color) !important;
      color: var(--mercury-text-color) !important;
    }

    body .mercury-left-panel .mercury-sidebar-title {
      color: var(--mercury-sidebar-title-color) !important;
      font-family: var(--mercury-heading-font-family);
    }

    body .mercury-sidebar-toggle {
      color: var(--mercury-text-color);
      border: 1px solid transparent;
    }

    body .mercury-left-panel .mercury-sidebar-toggle {
      color: var(--mercury-sidebar-text-color);
    }

    body .mercury-sidebar-toggle:hover {
      background: var(--mercury-hover-background-color);
    }

    body .mercury-sidebar-toggle:focus,
    body .mercury-sidebar-toggle:focus-visible,
    body .mercury-sidebar-toggle:active {
      color: var(--mercury-focus-border-color);
      border-color: var(--mercury-focus-border-color);
      box-shadow: none !important;
    }

    body .mercury-runall-btn {
      background: var(--mercury-run-button-background) !important;
      color: var(--mercury-run-button-text-color) !important;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.3) inset,
        0 3px 6px rgba(22, 179, 100, 0.25);
    }

    body .mercury-runall-btn:hover {
      background: var(--mercury-run-button-background-hover) !important;
    }

    body .mercury-runall-btn:focus-visible {
      outline: 2px solid var(--mercury-run-button-focus-color) !important;
      outline-offset: 2px;
    }

    body .mercury-toast {
      background: var(--mercury-toast-background-color);
      color: var(--mercury-toast-text-color);
      box-shadow: var(--mercury-shadow-md);
    }

    body .mercury-toast-error {
      border-left-color: var(--mercury-toast-error-border-color);
    }
  </style>
</head>

<body>

  {# Copy so we do not modify the page_config with updates. #}
  {% set page_config_full = page_config.copy() %}
  {% set _ = page_config_full.update(baseUrl=base_url, wsUrl=ws_url) %}

  <script id="jupyter-config-data" type="application/json">
    {{ page_config_full | tojson }}
  </script>
  <script src="{{page_config['fullStaticUrl'] | e}}/bundle.js" main="index"></script>

  <script type="text/javascript">
    /* Remove token from URL. */
    (function () {
      var parsedUrl = new URL(window.location.href);
      if (parsedUrl.searchParams.get('token')) {
        parsedUrl.searchParams.delete('token');
        window.history.replaceState({}, '', parsedUrl.href);
      }
    })();

    /* Expose a helper to hide the persistent loader when ready */
    window.hideMercuryLoader = function () {
      document.documentElement.classList.add('hide-loader');
    };

    /* Dynamically set --header-height to the real header height for perfect positioning */
    (function () {
      var params = new URLSearchParams(window.location.search);
      var hasNavbar = !params.has('no-navbar');

      function setHeaderHeightVar() {
        if (!hasNavbar) {
          document.documentElement.classList.add('no-navbar');
          document.documentElement.style.setProperty('--header-height', '0px');
          return;
        }
        var hdr = document.querySelector('.mrc-hdr, .hdr');
        if (!hdr) return;
        var h = hdr.offsetHeight || 52;
        document.documentElement.style.setProperty('--header-height', h + 'px');
      }
      // Initial + on resize + when fonts finish loading
      window.addEventListener('load', setHeaderHeightVar);
      window.addEventListener('resize', setHeaderHeightVar);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(setHeaderHeightVar).catch(function(){});
      }
      // In case Jupyter reflows, try again shortly after boot
      setTimeout(setHeaderHeightVar, 300);
      setTimeout(setHeaderHeightVar, 1000);
    })();

  </script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      if (params.has('no-navbar')) {
        document.documentElement.classList.add('no-navbar');
        document.documentElement.style.setProperty('--header-height', '0px');
      }
    })();
  
    // Loader is hidden explicitly by the app once cells finish executing.
  </script>
  
  <!-- Body may be replaced by the app; overlay stays visible and responsive. -->

</body>
</html>
